<div class="anatomy-tabs mt-2" xmlns:th="https://www.thymeleaf.org">
    <ul class="nav nav-tabs border-bottom-0">
        <li class="nav-item" th:each="name : ${page.allContextNames}">
            <a class="nav-link" 
               th:href="@{/anatomy/{name}(name=${name})}"
               th:classappend="${page.contextName == name} ? 'active' : ''">
                <i class="bi bi-pc-display-horizontal me-1"></i>
                <span th:text="${name}">Context Name</span>
            </a>
        </li>
    </ul>
</div>
