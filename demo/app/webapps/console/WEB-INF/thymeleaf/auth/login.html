<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/__${page.layout}__}">
<head>
    <style>
        .login-card {
            max-width: 400px;
            margin: 100px auto;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="card login-card shadow">
            <div class="card-body p-5 text-center">
                <img src="https://assets.aspectran.com/img/aspectran-logo.svg" class="mb-4" style="height: 48px;" alt="Aspectran"/>
                <h2 class="fw-bold mb-2">Login</h2>
                <p class="text-muted mb-5">Please enter your username and password!</p>

                <form id="login-form">
                    <div class="form-floating mb-3 text-start">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-4 text-start">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>

                    <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg" type="submit">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script th:inline="javascript">
            $(function() {
                $('#login-form').on('submit', function(e) {
                    e.preventDefault();
                    const $error = $('#error-message');
                    $error.addClass('d-none');

                    $.ajax({
                        url: [[@{/auth/login}]],
                        type: 'POST',
                        data: $(this).serialize(),
                        dataType: 'json',
                        success: function(response) {
                            console.log('Login Response:', response);
                            if (response.success) {
                                location.href = [[@{/}]];
                            } else {
                                let message = (response.error ? response.error.message : 'Login failed');
                                $error.text(message).removeClass('d-none');
                            }
                        },
                        error: function() {
                            $error.text('An error occurred. Please try again.').removeClass('d-none');
                        }
                    });
                });
            });
        </script>
    </th:block>
</body>
</html>
